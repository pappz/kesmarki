<v-overlay v-if="isLoading" color="#1E2333" opacity="1" class="loader">
    <div class="splash-content">
        <img class="splash-logo" src="@/assets/logo.png" alt="Kesmarki" />

        <v-progress-circular
            :indeterminate="!hasError"
            :color="hasError ? 'error' : '#FF9E2C'"
            size="56"
            width="4"
        >
            <v-icon v-if="hasError" color="error" size="28">mdi-lan-disconnect</v-icon>
        </v-progress-circular>

        <div class="splash-status" :class="{ 'splash-status--error': hasError }">
            <template v-if="hasError">Connection failed</template>
            <template v-else>Connecting to broker…</template>
        </div>
        <div class="splash-target">{{ brokerUrl }}</div>
    </div>
</v-overlay>
