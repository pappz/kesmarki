<v-overlay v-if="isLoading" color="white" opacity="1" class="loader">
    <div class="splash-content">
        <v-progress-circular
            :indeterminate="!hasError"
            :color="hasError ? 'error' : 'primary'"
            size="130"
            width="6"
        >
            <span v-if="!hasError" class="splash-spinner-text">Connecting...</span>
            <v-icon v-else color="error" size="48">mdi-lan-disconnect</v-icon>
        </v-progress-circular>

        <div class="splash-status" :class="{ 'splash-status--error': hasError }">
            <template v-if="hasError">Connection failed</template>
            <template v-else>Connecting to broker…</template>
        </div>
        <div class="splash-target">{{ brokerUrl }}</div>
    </div>
</v-overlay>
